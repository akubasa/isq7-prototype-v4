<!doctype html>
<html lang="de" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ISQ7 - Intelligent Inquiry Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --bg-card: #111119;
    --bg-card-hover: #1a1a28;
    --bg-elev: #15151e;
    --sidebar: #0c0c16;
    --gold: #c4a03c;
    --gold-light: #dbc060;
    --gold-muted: rgba(196, 160, 60, 0.3);
    --gold-glow: rgba(196, 160, 60, 0.12);
    --green: #22c55e;
    --green-muted: rgba(34, 197, 94, 0.25);
    --red: #f87171;
    --red-muted: rgba(248, 113, 113, 0.2);
    --accent: #60a5fa;
    --accent-muted: rgba(96, 165, 250, 0.25);
    --purple: #c084fc;
    --pink: #f472b6;
    --vip: #fbbf24;
    --text: #ffffff;
    --text-sub: rgba(255, 255, 255, 0.78);
    --text-muted: rgba(255, 255, 255, 0.5);
    --text-dim: rgba(255, 255, 255, 0.35);
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.14);
    --font-d: "Outfit", system-ui, sans-serif;
    --font-b: "Inter", system-ui, sans-serif;
    --font-m: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); }
  body { font-family: var(--font-b); color: var(--text); -webkit-font-smoothing: antialiased; font-size: 14px; line-height: 1.5; }
  h1, h2, h3 { font-family: var(--font-d); font-weight: 800; letter-spacing: -0.01em; margin: 0; }
  .mono { font-family: var(--font-m); font-variant-numeric: tabular-nums; }
  button { font-family: inherit; border: none; cursor: pointer; background: none; color: inherit; padding: 0; }
  textarea, input { font-family: inherit; color: var(--text); }
  a { color: var(--accent); text-decoration: none; }

  /* Layout */
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 0; flex-shrink: 0; position: sticky; top: 0; height: 100vh; }
  .logo-block { padding: 0 24px 28px; display: flex; align-items: center; gap: 12px; }
  .logo-mark { width: 32px; height: 32px; border-radius: 8px; background: rgba(196, 160, 60, 0.12); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: var(--gold); font-family: var(--font-d); }
  .logo-name { font-size: 18px; font-weight: 800; letter-spacing: 1px; font-family: var(--font-d); }
  .nav-item { padding: 12px 24px; display: flex; align-items: center; gap: 14px; cursor: pointer; border-left: 3px solid transparent; transition: background 0.15s; font-size: 15px; color: var(--text-muted); font-weight: 400; width: 100%; text-align: left; }
  .nav-item:hover { background: rgba(255,255,255,0.02); color: var(--text-sub); }
  .nav-item.active { background: rgba(196, 160, 60, 0.06); border-left-color: var(--gold); color: var(--text); font-weight: 700; }
  .nav-item .badge { font-size: 12px; color: var(--gold); font-weight: 700; margin-left: auto; }
  .hotel-meta { margin-top: auto; padding: 16px 24px; border-top: 1px solid var(--border); }
  .hotel-meta .name { font-size: 13px; color: var(--text-muted); }
  .hotel-meta .group { font-size: 12px; color: var(--gold); margin-top: 4px; }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; flex-shrink: 0; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .topbar .title { display: flex; align-items: center; gap: 16px; }
  .topbar h1 { font-size: 18px; font-weight: 800; }
  .topbar .sub { font-size: 13px; color: var(--text-muted); }
  .live-dot { display: flex; align-items: center; gap: 6px; }
  .live-dot .d { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
  .live-dot span { font-size: 12px; color: var(--green); font-weight: 600; letter-spacing: 1px; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: rgba(96, 165, 250, 0.15); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--accent); }
  .content { flex: 1; padding: 28px 32px 56px; max-width: 1400px; width: 100%; }
  .content.narrow { max-width: 900px; }

  /* Cards */
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 22px 26px; }
  .card-tight { padding: 16px 20px; }
  .card-lg { padding: 28px 32px; border-radius: 16px; }

  /* Badges */
  .bdg { font-size: 11px; padding: 4px 12px; border-radius: 6px; font-weight: 700; letter-spacing: 1px; display: inline-block; white-space: nowrap; text-transform: uppercase; }
  .bdg.sm { font-size: 10px; padding: 3px 9px; letter-spacing: 0.5px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 10px; padding: 12px 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.12s, border-color 0.12s, transform 0.08s; }
  .btn:hover { background: var(--bg-card-hover); border-color: var(--border-strong); }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: linear-gradient(135deg, var(--green), #34d399); color: #022c17; border: 0; padding: 14px 22px; font-size: 15px; font-weight: 800; }
  .btn-primary:hover { box-shadow: 0 4px 14px rgba(34, 197, 94, 0.25); background: linear-gradient(135deg, var(--green), #34d399); }
  .btn-accent { background: linear-gradient(135deg, var(--accent), #818cf8); color: #0a0a12; border: 0; font-weight: 800; position: relative; }
  .btn-accent:hover:not(:disabled) { background: linear-gradient(135deg, #818cf8, var(--accent)); color: #0a0a12; border: 0; box-shadow: 0 4px 18px rgba(96, 165, 250, 0.32); transform: translateY(-1px); }
  .btn-accent:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #0a0a12; border: 0; font-weight: 800; position: relative; isolation: isolate; overflow: visible; }
  .btn-gold:hover:not(:disabled) { background: linear-gradient(135deg, var(--gold-light), var(--gold)); color: #0a0a12; border: 0; box-shadow: 0 4px 18px rgba(196, 160, 60, 0.38); transform: translateY(-1px); }
  .btn-gold:disabled { opacity: 0.42; cursor: not-allowed; transform: none; box-shadow: none; }
  /* OSQ1-style rotating gold halo when ready to press */
  .btn-gold.is-ready { animation: btn-glow-pulse 2.4s ease-in-out infinite; }
  .btn-gold.is-ready::before {
    content: "";
    position: absolute;
    inset: -3px;
    border-radius: 13px;
    background: conic-gradient(from 0deg, transparent 0deg, var(--gold-light) 40deg, #ffe28a 80deg, var(--gold-light) 120deg, transparent 180deg, transparent 360deg);
    z-index: -1;
    animation: btn-spin 2.4s linear infinite;
    filter: blur(2px);
    pointer-events: none;
  }
  @keyframes btn-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes btn-glow-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(196, 160, 60, 0), 0 2px 10px rgba(196, 160, 60, 0.18); }
    50% { box-shadow: 0 0 0 2px rgba(196, 160, 60, 0.28), 0 4px 20px rgba(196, 160, 60, 0.45); }
  }
  .btn-ghost { background: transparent; border: 0; color: var(--text-muted); padding: 8px 14px; border-radius: 8px; }
  .btn-ghost:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .btn-sm { padding: 8px 14px; font-size: 13px; }
  .btn-icon { padding: 8px; border-radius: 8px; width: 36px; height: 36px; justify-content: center; }

  /* Eyebrow / titles */
  .eyebrow { font-size: 12px; color: var(--gold); letter-spacing: 3px; font-weight: 700; text-transform: uppercase; }
  .page-title { font-size: 32px; font-weight: 800; line-height: 1.15; margin-top: 6px; }
  .page-lede { font-size: 16px; color: var(--text-sub); margin-top: 10px; max-width: 720px; line-height: 1.55; }
  .page-head { margin-bottom: 28px; }

  /* Section heads */
  .section-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
  .section-head h3 { font-size: 16px; font-weight: 700; }
  .section-head .note { font-size: 12px; color: var(--text-muted); font-family: var(--font-m); }

  /* Inquiry row */
  .inq-row { display: grid; grid-template-columns: 1.8fr 2.8fr 1fr 1.3fr 0.8fr 0.3fr; gap: 14px; align-items: center; padding: 16px 22px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
  .inq-row:last-child { border-bottom: none; }
  .inq-row:hover { background: rgba(255,255,255,0.02); }
  .inq-row .avatar-sm { width: 38px; height: 38px; border-radius: 10px; background: rgba(196, 160, 60, 0.14); color: var(--gold); font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .inq-row.vip .avatar-sm { background: linear-gradient(135deg, var(--vip), #f59e0b); color: #1a1405; }
  .inq-row .co { font-size: 15px; font-weight: 700; }
  .inq-row .subj { font-size: 13px; color: var(--text-sub); line-height: 1.45; }
  .inq-row .rev { font-size: 15px; font-weight: 700; color: var(--gold); font-family: var(--font-m); }
  .inq-row .t { font-size: 13px; color: var(--text-muted); font-family: var(--font-m); }
  .inq-row .arrow { font-size: 18px; color: var(--text-muted); text-align: right; }
  .inq-header { display: grid; grid-template-columns: 1.8fr 2.8fr 1fr 1.3fr 0.8fr 0.3fr; gap: 14px; padding: 14px 22px; font-size: 11px; color: var(--text-muted); font-weight: 700; letter-spacing: 2px; border-bottom: 1px solid var(--border); }

  /* KV rows */
  .kv { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px dashed var(--border); font-size: 14px; }
  .kv:last-child { border-bottom: none; }
  .kv .k { color: var(--text-muted); }
  .kv .v { color: var(--text); font-weight: 600; }

  /* Email blocks */
  .email-head { display: grid; grid-template-columns: 90px 1fr; gap: 6px 14px; padding: 14px 18px; background: rgba(96, 165, 250, 0.05); border: 1px solid rgba(96, 165, 250, 0.18); border-radius: 10px 10px 0 0; font-size: 13px; }
  .email-head .l { color: var(--text-muted); font-size: 12px; }
  .email-body { padding: 18px 20px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-top: 0; border-radius: 0 0 10px 10px; font-size: 14px; line-height: 1.65; color: var(--text-sub); white-space: pre-wrap; font-family: var(--font-b); }

  /* AI process steps (legacy) */
  .step-v { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; font-size: 14px; }
  .step-v:last-child { border-bottom: none; }
  .step-v:hover { background: rgba(255,255,255,0.02); }
  .step-v .check { width: 22px; height: 22px; border-radius: 50%; background: rgba(34,197,94,0.12); color: var(--green); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; flex-shrink: 0; }
  .step-v .check.pending { background: rgba(196,160,60,0.12); color: var(--gold); }
  .step-v .label { flex: 1; }
  .step-v .time { font-size: 12px; color: var(--text-muted); font-family: var(--font-m); }
  .step-panel { padding: 16px 18px; background: rgba(255,255,255,0.02); border-left: 3px solid var(--accent); margin: 0 0 0 34px; border-radius: 0 10px 10px 0; font-size: 13px; color: var(--text-sub); }

  /* === VIDEO-STYLE TIMELINE (vtl) === */
  .vtl { display: flex; flex-direction: column; gap: 14px; padding: 4px 0; }
  .vtl-event { display: grid; grid-template-columns: 72px 4px 1fr; gap: 16px; align-items: stretch; opacity: 0; transform: translateY(12px); animation: stagger-reveal 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  .vtl-event.r1 { animation-delay: 0.05s; } .vtl-event.r2 { animation-delay: 0.14s; }
  .vtl-event.r3 { animation-delay: 0.23s; } .vtl-event.r4 { animation-delay: 0.32s; }
  .vtl-event.r5 { animation-delay: 0.41s; } .vtl-event.r6 { animation-delay: 0.50s; }
  .vtl-event.r7 { animation-delay: 0.59s; } .vtl-event.r8 { animation-delay: 0.68s; }
  .vtl-time { text-align: right; padding-top: 18px; font-family: var(--font-m); font-size: 12px; color: var(--text-muted); letter-spacing: 0.5px; }
  .vtl-spine { border-radius: 2px; min-height: 48px; align-self: stretch; position: relative; box-shadow: 0 0 8px currentColor; }
  .vtl-spine::before { content: ""; position: absolute; left: 50%; top: 16px; width: 10px; height: 10px; border-radius: 50%; transform: translateX(-50%); background: currentColor; box-shadow: 0 0 8px currentColor, 0 0 16px currentColor; }
  .vtl-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; position: relative; }
  .vtl-card:hover { border-color: rgba(255,255,255,0.18); transform: translateX(2px); }
  .vtl-card.expanded { border-color: var(--gold-muted); box-shadow: 0 0 20px var(--gold-glow); }
  .vtl-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .agent-badge { font-size: 10px; padding: 3px 10px; border-radius: 6px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }
  .agent-badge.email { color: var(--accent); background: color-mix(in srgb, var(--accent) 15%, transparent); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); }
  .agent-badge.ai { color: var(--green); background: color-mix(in srgb, var(--green) 15%, transparent); border: 1px solid color-mix(in srgb, var(--green) 30%, transparent); }
  .agent-badge.system { color: var(--accent); background: color-mix(in srgb, var(--accent) 15%, transparent); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); }
  .agent-badge.pricing { color: var(--gold); background: color-mix(in srgb, var(--gold) 15%, transparent); border: 1px solid color-mix(in srgb, var(--gold) 30%, transparent); }
  .agent-badge.pdf { color: var(--purple); background: color-mix(in srgb, var(--purple) 15%, transparent); border: 1px solid color-mix(in srgb, var(--purple) 30%, transparent); }
  .agent-badge.status { color: var(--gold); background: color-mix(in srgb, var(--gold) 15%, transparent); border: 1px solid color-mix(in srgb, var(--gold) 30%, transparent); }
  .agent-badge.vip { color: var(--vip); background: color-mix(in srgb, var(--vip) 15%, transparent); border: 1px solid color-mix(in srgb, var(--vip) 30%, transparent); }
  .vtl-card-sublabel { font-size: 12px; color: var(--text-muted); }
  .vtl-card-body { font-size: 13px; color: var(--text-sub); line-height: 1.6; }
  .vtl-card-detail { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); }
  .vtl-expand-icon { position: absolute; right: 14px; top: 14px; color: var(--text-muted); font-size: 16px; transition: transform 0.2s; }
  .vtl-card.expanded .vtl-expand-icon { transform: rotate(90deg); color: var(--gold); }

  /* === GOLD GLOW FOR KEY CARDS === */
  .glow-gold { box-shadow: 0 0 30px var(--gold-glow); border-color: var(--gold-muted) !important; }
  .glow-green { box-shadow: 0 0 20px rgba(34, 197, 94, 0.15); border-color: rgba(34, 197, 94, 0.3) !important; }
  .glow-accent { box-shadow: 0 0 20px rgba(96, 165, 250, 0.12); border-color: rgba(96, 165, 250, 0.25) !important; }

  /* === STAGGER ANIMATIONS === */
  @keyframes stagger-reveal { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse-dot { 0%,100% { transform: translateX(-50%) scale(1); opacity: 1; } 50% { transform: translateX(-50%) scale(1.3); opacity: 0.7; } }

  .stagger-r1 { animation: stagger-reveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.05s forwards; opacity: 0; }
  .stagger-r2 { animation: stagger-reveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.12s forwards; opacity: 0; }
  .stagger-r3 { animation: stagger-reveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.19s forwards; opacity: 0; }
  .stagger-r4 { animation: stagger-reveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.26s forwards; opacity: 0; }
  .stagger-r5 { animation: stagger-reveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.33s forwards; opacity: 0; }
  .stagger-r6 { animation: stagger-reveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.40s forwards; opacity: 0; }
  .stagger-r7 { animation: stagger-reveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.47s forwards; opacity: 0; }

  /* === PROPOSAL READY HERO CARD === */
  .proposal-ready { padding: 28px; border-radius: 16px; background: linear-gradient(135deg, rgba(196,160,60,0.08) 0%, rgba(196,160,60,0.02) 100%); border: 1px solid var(--gold-muted); position: relative; overflow: hidden; }
  .proposal-ready::before { content: ""; position: absolute; top: -40%; right: -20%; width: 220px; height: 220px; background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%); pointer-events: none; }
  .proposal-ready-head { font-size: 12px; color: var(--gold); letter-spacing: 3px; font-weight: 700; text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .proposal-ready-head::before { content: "✦"; font-size: 16px; }
  .proposal-ready-amount { font-size: 36px; font-weight: 900; color: var(--green); font-family: var(--font-m); letter-spacing: -0.5px; }
  .proposal-ready-formula { font-size: 13px; color: var(--text-sub); margin-top: 6px; }

  /* === INBOX GLOWING NEW CARD === */
  .inq-row.glow-new { box-shadow: inset 3px 0 0 var(--gold); background: rgba(196,160,60,0.04); }
  .inq-row.glow-new:hover { background: rgba(196,160,60,0.07); }

  /* === ACTIVITY FEED (video style) === */
  .activity-feed { position: relative; padding: 4px 0; }
  .activity-event { display: grid; grid-template-columns: 60px 3px 1fr; gap: 14px; padding: 10px 0; align-items: center; }
  .activity-event .t { font-family: var(--font-m); font-size: 12px; color: var(--text-muted); text-align: right; }
  .activity-event .spine { height: 100%; min-height: 16px; border-radius: 2px; box-shadow: 0 0 6px currentColor; }
  .activity-event .text { font-size: 13px; color: var(--text-sub); line-height: 1.55; }
  .activity-event:hover { background: rgba(255,255,255,0.015); border-radius: 8px; }

  /* Market bar */
  .comp-row { display: grid; grid-template-columns: 1.4fr 2fr auto; gap: 18px; align-items: center; padding: 14px 20px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
  .comp-row.ours { background: rgba(196,160,60,0.06); border-color: var(--gold-muted); }
  .comp-row .name { font-size: 14px; font-weight: 600; }
  .comp-row .ours-tag { color: var(--gold); }
  .comp-row .bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.06); overflow: hidden; }
  .comp-row .bar .fill { height: 100%; border-radius: 3px; }
  .comp-row .price { font-size: 15px; font-weight: 700; font-family: var(--font-m); min-width: 68px; text-align: right; }

  /* Stat cards */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 20px 18px; }
  .stat-card .lab { font-size: 11px; color: var(--text-muted); letter-spacing: 3px; margin-bottom: 10px; font-weight: 700; }
  .stat-card .val { font-size: 32px; font-weight: 900; }
  .stat-card .delta { font-size: 12px; margin-top: 4px; color: var(--text-muted); }
  .stat-card .delta.pos { color: var(--green); }
  .stat-card .delta.neg { color: var(--red); }

  /* Memory card */
  .memory-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 18px 0; border-bottom: 1px solid var(--border); }
  .memory-stats > div .l { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 6px; font-weight: 600; }
  .memory-stats > div .v { font-size: 20px; font-weight: 800; }
  .memory-empty { display: flex; align-items: center; gap: 16px; padding: 14px 0; }
  .new-badge { padding: 10px 14px; border-radius: 10px; background: rgba(96,165,250,0.12); color: var(--accent); font-size: 12px; font-weight: 800; letter-spacing: 2px; }
  .ai-reason { margin-top: 18px; padding: 16px 18px; background: rgba(196, 160, 60, 0.06); border: 1px solid var(--gold-muted); border-radius: 12px; }
  .ai-reason-head { display: flex; align-items: center; gap: 8px; color: var(--gold); font-size: 12px; font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
  .ai-reason-body { font-size: 14px; color: var(--text-sub); line-height: 1.65; }

  /* History rows */
  .hist-row { display: grid; grid-template-columns: 100px 1.5fr 80px 110px 1.5fr; gap: 12px; padding: 10px 0; font-size: 13px; align-items: center; border-bottom: 1px dashed var(--border); }
  .hist-row:last-child { border-bottom: none; }
  .hist-row .when { font-family: var(--font-m); color: var(--text-muted); }
  .hist-row .reason { color: var(--text-muted); font-size: 12px; font-style: italic; }

  /* VIP banner */
  .vip-banner { display: flex; align-items: flex-start; gap: 16px; padding: 18px 22px; background: linear-gradient(135deg, rgba(251,191,36,0.08), rgba(245,158,11,0.04)); border: 1px solid rgba(251,191,36,0.3); border-left: 4px solid var(--vip); border-radius: 12px; margin-bottom: 18px; }
  .vip-banner .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--vip); box-shadow: 0 0 10px var(--vip); margin-top: 3px; flex-shrink: 0; }

  /* Timeline (archive detail) */
  .timeline { position: relative; }
  .tl-row { display: grid; grid-template-columns: 120px 32px 1fr; gap: 14px; padding: 10px 0; align-items: center; }
  .tl-row .tl-time { font-family: var(--font-m); font-size: 12px; color: var(--text-muted); }
  .tl-row .tl-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .tl-row .tl-label { font-size: 14px; color: var(--text-sub); line-height: 1.55; }

  /* Filter pills */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .filter-pill { padding: 8px 14px; border-radius: 8px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); font-size: 13px; cursor: pointer; font-weight: 600; }
  .filter-pill:hover { color: var(--text); background: var(--bg-card-hover); }
  .filter-pill.active { background: rgba(196,160,60,0.1); border-color: var(--gold-muted); color: var(--gold); }

  /* AI adjust chat */
  .chat { display: flex; flex-direction: column; gap: 8px; padding: 14px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; max-height: 240px; overflow-y: auto; }
  .msg { padding: 10px 14px; border-radius: 10px; font-size: 13px; line-height: 1.55; max-width: 80%; }
  .msg.me { align-self: flex-end; background: rgba(96, 165, 250, 0.12); border: 1px solid rgba(96, 165, 250, 0.2); }
  .msg.ai { align-self: flex-start; background: var(--bg-elev); border: 1px solid var(--border); }
  .msg.error { border-color: var(--red-muted); background: rgba(248,113,113,0.08); }
  .msg.sent { align-self: center; background: rgba(34,197,94,0.1); border: 1px solid var(--green-muted); color: var(--green); font-size: 12px; padding: 6px 12px; }
  .sugg { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .sugg button { padding: 6px 12px; font-size: 12px; color: var(--text-muted); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }
  .sugg button:hover { color: var(--text); background: rgba(255,255,255,0.08); }

  /* Textarea */
  .ta { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; font-family: inherit; resize: vertical; line-height: 1.55; }
  .ta:focus { outline: none; border-color: var(--gold-muted); }

  /* Success / big check */
  .big-check { width: 86px; height: 86px; border-radius: 50%; background: rgba(34,197,94,0.12); color: var(--green); display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto 20px; font-weight: 900; }

  /* Toasts */
  .toast-host { position: fixed; top: 80px; right: 32px; z-index: 100; display: flex; flex-direction: column; gap: 10px; max-width: 400px; }
  .toast-item { background: var(--bg-card); border: 1px solid; border-left-width: 4px; border-radius: 12px; padding: 14px 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.4); animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1); font-size: 14px; font-weight: 600; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease-out forwards; }

  /* Settings */
  .rule-cat { border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; background: var(--bg-elev); margin-bottom: 10px; }
  .rule-cat .head { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .rule-item { display: grid; grid-template-columns: 110px 1fr 40px; gap: 14px; padding: 14px 0; border-bottom: 1px dashed var(--border); align-items: start; }
  .rule-item:last-child { border-bottom: none; }
  .rule-text { font-size: 14px; line-height: 1.6; }
  .rule-text[contentEditable]:focus { outline: none; background: rgba(96,165,250,0.08); border-radius: 4px; padding: 4px 6px; margin: -4px -6px; }
  .rule-del { background: transparent; border: 0; color: var(--text-muted); font-size: 22px; cursor: pointer; line-height: 1; padding: 2px 8px; }
  .rule-del:hover { color: var(--red); }

  /* Rate shopping specific */
  .event-card { padding: 16px 20px; border-radius: 12px; background: var(--bg-card); border: 1px solid var(--border); border-left: 3px solid; display: grid; grid-template-columns: 120px 1fr auto; gap: 16px; align-items: center; margin-bottom: 8px; }
  .event-card .date { font-family: var(--font-m); font-size: 13px; color: var(--text-muted); }
  .event-card .name { font-size: 15px; font-weight: 700; }
  .event-card .desc { font-size: 13px; color: var(--text-sub); }
  .event-card .impact { font-family: var(--font-m); font-size: 14px; font-weight: 800; }

  /* Scrollbars */
  .content::-webkit-scrollbar, .chat::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

  /* Grid helpers */
  .grid-2 { display: grid; grid-template-columns: 1fr 360px; gap: 22px; align-items: start; }
  .grid-2-split { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  .flex { display: flex; }
  .flex-col { flex-direction: column; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .gap-16 { gap: 16px; }
  .gap-24 { gap: 24px; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .mt-24 { margin-top: 24px; }
  .mt-32 { margin-top: 32px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-24 { margin-bottom: 24px; }
  .mb-32 { margin-bottom: 32px; }
  .txt-gold { color: var(--gold); }
  .txt-green { color: var(--green); }
  .txt-red { color: var(--red); }
  .txt-muted { color: var(--text-muted); }
  .txt-sub { color: var(--text-sub); }
  .txt-mono { font-family: var(--font-m); }
  .flex-1 { flex: 1; }

  /* Empty state */
  .empty { padding: 48px 24px; text-align: center; color: var(--text-muted); }
</style>
</head>
